<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="700" fill="white">A lifetime of scrolling</text>
  <text x="60" y="145" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">2 hours/day × 50 years = 4.2 years of life</text>

  <!-- Center hourglass -->
  <g transform="translate(600, 320)">
    <path d="M -100,-120 L 100,-120 L 100,-110 L 0,0 L 100,110 L 100,120 L -100,120 L -100,110 L 0,0 L -100,-110 Z"
          fill="rgba(255,255,255,0.95)" opacity="0.9"/>
    <path d="M -100,-120 L 100,-120 L 100,-110 L 0,0 L 100,110 L 100,120 L -100,120 L -100,110 L 0,0 L -100,-110 Z"
          fill="none" stroke="white" stroke-width="3"/>
    <!-- Sand in top half -->
    <path d="M -85,-115 L 85,-115 L 85,-105 L 35,-50 L -35,-50 L -85,-105 Z" fill="#fbbf24"/>
    <!-- Sand in bottom half -->
    <path d="M -75,60 L 75,60 L 75,100 L 50,115 L -50,115 L -75,100 Z" fill="#fbbf24"/>
  </g>

  <!-- Phone in the middle -->
  <g transform="translate(600, 320)">
    <rect x="-25" y="-45" width="50" height="80" rx="6" fill="#1f2937" stroke="white" stroke-width="2"/>
    <rect x="-20" y="-35" width="40" height="55" rx="2" fill="#3b82f6"/>
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="20" text-anchor="middle" fill="white" font-weight="700">📱</text>
  </g>

  <!-- Cost labels around -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="white">
    <text x="200" y="280" font-size="18" font-weight="600">⏰ 4.2 years lost</text>
    <text x="200" y="305" font-size="14" fill="rgba(255,255,255,0.85)">36,500 hours</text>

    <text x="200" y="380" font-size="18" font-weight="600">💰 $1M+ opportunity</text>
    <text x="200" y="405" font-size="14" fill="rgba(255,255,255,0.85)">in lost time value</text>

    <text x="900" y="280" font-size="18" font-weight="600" text-anchor="end">🧠 Mental cost</text>
    <text x="900" y="305" font-size="14" text-anchor="end" fill="rgba(255,255,255,0.85)">2x anxiety risk</text>

    <text x="900" y="380" font-size="18" font-weight="600" text-anchor="end">❤️ Health cost</text>
    <text x="900" y="405" font-size="14" text-anchor="end" fill="rgba(255,255,255,0.85)">sleep, focus, mood</text>
  </g>

  <text x="60" y="580" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.95)">ZAQORI</text>
  <text x="60" y="610" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">See what today's choices mean in 10 years</text>
</svg>