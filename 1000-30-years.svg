<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="44" font-weight="700" fill="white">$1,000 → 30 years</text>
  <text x="60" y="145" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">Three return scenarios, three very different endings</text>

  <!-- Three growth curves -->
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <path d="M 100,500 Q 300,498 600,490 T 1100,470" stroke="rgba(255,255,255,0.5)" stroke-dasharray="8,4"/>
    <path d="M 100,500 Q 300,480 600,420 T 1100,250" stroke="#fbbf24" stroke-width="6"/>
    <path d="M 100,500 Q 300,460 600,360 T 1100,100" stroke="white" stroke-width="7"/>
  </g>

  <!-- Labels at end of each curve -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="white">
    <text x="60" y="540" font-size="16" fill="rgba(255,255,255,0.7)">1% — savings account</text>
    <text x="60" y="565" font-size="18" font-weight="600">$1,348</text>

    <text x="1010" y="450" font-size="14" text-anchor="end" fill="rgba(255,255,255,0.7)">7% — balanced</text>
    <text x="1010" y="475" font-size="20" font-weight="700" text-anchor="end" fill="#fbbf24">$7,612</text>

    <text x="1010" y="200" font-size="14" text-anchor="end" fill="rgba(255,255,255,0.7)">10% — equity</text>
    <text x="1010" y="225" font-size="22" font-weight="700" text-anchor="end">$17,449</text>
  </g>

  <text x="60" y="580" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.95)">ZAQORI</text>
  <text x="60" y="610" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">See what today's choices mean in 10 years</text>
</svg>