<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="700" fill="white">Tiny decisions, huge outcomes</text>
  <text x="60" y="145" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">The 1% rule, compounded over a lifetime</text>

  <!-- Branching paths -->
  <g stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Path 1: 1% better -->
    <path d="M 100,500 Q 200,495 300,470 Q 400,430 500,360 Q 600,280 700,200 Q 800,140 900,100 Q 1000,80 1100,70" stroke="white" stroke-width="6"/>
    <!-- Path 2: 1% worse -->
    <path d="M 100,500 Q 200,505 300,515 Q 400,530 500,545 Q 600,555 700,560" stroke="rgba(255,255,255,0.4)" stroke-dasharray="6,4"/>
  </g>

  <!-- 1% markers -->
  <g fill="#fbbf24">
    <circle cx="100" cy="500" r="10"/>
    <circle cx="300" cy="470" r="10"/>
    <circle cx="500" cy="360" r="10"/>
    <circle cx="700" cy="200" r="10"/>
    <circle cx="900" cy="100" r="10"/>
  </g>

  <!-- Start label -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="white">
    <text x="100" y="540" font-size="13" text-anchor="middle">Day 1</text>
    <text x="100" y="558" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.85)">1% better</text>

    <text x="900" y="135" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.85)">Year 1</text>
    <text x="900" y="155" font-size="14" text-anchor="middle" font-weight="700">37x better</text>

    <text x="700" y="235" font-size="11" text-anchor="middle" fill="rgba(255,255,255,0.7)">Month 6</text>
    <text x="700" y="252" font-size="13" text-anchor="middle">6x better</text>
  </g>

  <!-- 1% better side -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="white">
    <text x="1010" y="200" font-size="14" text-anchor="end" fill="rgba(255,255,255,0.85)">Compound result</text>
    <text x="1010" y="230" font-size="32" font-weight="700" text-anchor="end">+3,650%</text>
    <text x="1010" y="260" font-size="12" text-anchor="end" fill="rgba(255,255,255,0.7)">over a decade</text>
  </g>

  <!-- 1% worse side -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="rgba(255,255,255,0.5)">
    <text x="700" y="540" font-size="13" text-anchor="middle">Year 1</text>
    <text x="700" y="558" font-size="12" text-anchor="middle">nearly zero</text>
  </g>

  <text x="60" y="580" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.95)">ZAQORI</text>
  <text x="60" y="610" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">See what today's choices mean in 10 years</text>
</svg>