<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="42" font-weight="700" fill="white">Your future wealth, projected</text>
  <text x="60" y="145" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.85)">A beginner's guide to seeing 30 years ahead</text>

  <!-- Calculator-like display -->
  <g transform="translate(600, 380)">
    <rect x="-220" y="-100" width="440" height="200" rx="12" fill="rgba(255,255,255,0.95)"/>
    <rect x="-200" y="-80" width="400" height="60" rx="6" fill="#0f172a"/>
    <text x="0" y="-45" font-family="ui-monospace, monospace" font-size="32" text-anchor="middle" fill="#10b981" font-weight="700">$1,000,000</text>

    <!-- Buttons -->
    <g fill="#e2e8f0">
      <rect x="-200" y="0" width="80" height="40" rx="4"/>
      <rect x="-110" y="0" width="80" height="40" rx="4"/>
      <rect x="-20" y="0" width="80" height="40" rx="4"/>
      <rect x="70" y="0" width="80" height="40" rx="4"/>
    </g>
    <g font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="#1e293b" text-anchor="middle">
      <text x="-160" y="26">$500/mo</text>
      <text x="-70" y="26">7%</text>
      <text x="20" y="26">30y</text>
      <text x="110" y="26" font-weight="700" fill="#3b82f6">RUN</text>
    </g>

    <g fill="#e2e8f0">
      <rect x="-200" y="50" width="380" height="40" rx="4" fill="#fef3c7"/>
    </g>
    <text x="0" y="76" font-family="-apple-system, system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#92400e">→ Project your numbers</text>
  </g>

  <!-- Floating numbers -->
  <g font-family="-apple-system, system-ui, sans-serif" fill="white" opacity="0.6">
    <text x="180" y="280" font-size="20" font-weight="600">$200,000</text>
    <text x="1020" y="280" font-size="20" font-weight="600" text-anchor="end">$500,000</text>
    <text x="180" y="490" font-size="16">Year 10</text>
    <text x="1020" y="490" font-size="16" text-anchor="end">Year 20</text>
  </g>

  <text x="60" y="580" font-family="-apple-system, system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.95)">ZAQORI</text>
  <text x="60" y="610" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">See what today's choices mean in 10 years</text>
</svg>